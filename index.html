<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>SURI VOGUE — 我的智能衣橱</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Noto+Serif+SC:wght@400;700&family=Noto+Sans+SC:wght@300;400;500;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
  <!-- Splash -->
  <div id="splash" class="splash">
    <div class="splash-inner">
      <div class="splash-logo">S·V</div>
      <div class="splash-title">SURI VOGUE</div>
      <div class="splash-sub">我的智能衣橱</div>
    </div>
  </div>

  <!-- Main -->
  <div id="main" class="main">
    <header class="topbar">
      <div class="topbar-left" id="topbarLeft"></div>
      <div class="topbar-title" id="topbarTitle">SURI VOGUE</div>
      <div class="topbar-right" id="topbarRight"></div>
    </header>

    <!-- ===== PAGE: 今日 ===== -->
    <section id="page-home" class="page active">
      <div class="page-scroll">
        <div class="home-hero">
          <div class="home-date" id="homeDate"></div>
          <h1 class="home-greeting" id="homeGreeting"></h1>
        </div>
        <!-- 今天穿了什么 -->
        <div class="today-wear-prompt" id="todayWearPrompt">
          <span class="twp-text">今天穿了什么？</span>
          <span class="twp-chosen hidden" id="twpChosen"></span>
          <button class="twp-btn" id="btnTodayWear">记录</button>
        </div>
        <!-- Input Card -->
        <div class="home-input-card">
          <div class="input-row">
            <label class="input-label">场合</label>
            <div class="occasion-tags" id="occasionTags">
              <button class="tag-btn active" data-occasion="通勤">通勤</button>
              <button class="tag-btn" data-occasion="休闲">休闲</button>
              <button class="tag-btn" data-occasion="约会">约会</button>
              <button class="tag-btn" data-occasion="运动">运动</button>
              <button class="tag-btn" data-occasion="正式">正式</button>
              <button class="tag-btn" data-occasion="度假">度假</button>
            </div>
          </div>
          <button class="btn-primary-light" id="btnRecommend">为我搭配</button>
        </div>
        <!-- Digital Human + Recommendations -->
        <div id="recoSection" class="reco-section hidden">
          <div class="digital-human-wrap">
            <div class="dh-placeholder" id="dhDisplay">
              <div class="dh-hint">数字人试衣<br><span style="font-size:0.7rem;color:var(--grey-400)">接入可灵后展示</span></div>
            </div>
          </div>
          <div class="reco-switcher" id="recoSwitcher"></div>
          <button class="btn-outline-dark" id="btnSelfStyle">自我搭配</button>
        </div>
        <!-- Self-style panel -->
        <div id="selfStylePanel" class="self-style-panel hidden">
          <h3 class="section-title">选择单品搭配</h3>
          <div class="self-style-grid" id="selfStyleGrid"></div>
          <button class="btn-primary" id="btnConfirmSelfStyle">确认搭配</button>
        </div>
        <!-- Recent -->
        <div class="recent-section">
          <h2 class="section-title">最近穿过</h2>
          <div class="recent-list" id="recentList"><div class="empty-hint">还没有穿着记录</div></div>
        </div>
      </div>
    </section>

    <!-- ===== PAGE: 衣橱 ===== -->
    <section id="page-wardrobe" class="page">
      <div class="page-scroll">
        <div class="wardrobe-header">
          <h1 class="page-title-lg">衣橱</h1>
          <div class="wardrobe-stats" id="wardrobeStats"></div>
        </div>
        <!-- Level 1 Tab: 单品 / 搭配组 -->
        <div class="tab-switch" id="wardrobeTab">
          <button class="tab-btn active" data-tab="items">单品</button>
          <button class="tab-btn" data-tab="outfits">搭配组</button>
        </div>
        <!-- Items filters -->
        <div class="filter-section" id="filterSection">
          <div class="filter-row">
            <label class="filter-label">类别</label>
            <div class="filter-scroll" id="filterCategory">
              <button class="filter-chip active" data-val="all">全部</button>
              <button class="filter-chip" data-val="上装">上装</button>
              <button class="filter-chip" data-val="下装">下装</button>
              <button class="filter-chip" data-val="外套">外套</button>
              <button class="filter-chip" data-val="连衣裙">连衣裙</button>
              <button class="filter-chip" data-val="鞋子">鞋子</button>
              <button class="filter-chip" data-val="配饰">配饰</button>
            </div>
          </div>
          <div class="filter-row">
            <label class="filter-label">季节</label>
            <div class="filter-scroll" id="filterSeason">
              <button class="filter-chip active" data-val="all">全部</button>
              <button class="filter-chip" data-val="春">春</button>
              <button class="filter-chip" data-val="夏">夏</button>
              <button class="filter-chip" data-val="秋">秋</button>
              <button class="filter-chip" data-val="冬">冬</button>
            </div>
          </div>
          <div class="filter-row">
            <label class="filter-label">颜色</label>
            <div class="filter-scroll" id="filterColor">
              <button class="filter-chip active" data-val="all">全部</button>
              <button class="filter-chip" data-val="黑">黑</button>
              <button class="filter-chip" data-val="白">白</button>
              <button class="filter-chip" data-val="灰">灰</button>
              <button class="filter-chip" data-val="米">米</button>
              <button class="filter-chip" data-val="棕">棕</button>
              <button class="filter-chip" data-val="蓝">蓝</button>
              <button class="filter-chip" data-val="红">红</button>
              <button class="filter-chip" data-val="粉">粉</button>
              <button class="filter-chip" data-val="绿">绿</button>
              <button class="filter-chip" data-val="紫">紫</button>
              <button class="filter-chip" data-val="黄">黄</button>
            </div>
          </div>
        </div>
        <!-- Items grid (2 per row) -->
        <div class="wardrobe-grid" id="wardrobeGrid"></div>
        <!-- Outfits grid -->
        <div class="wardrobe-grid hidden" id="outfitsGrid"></div>
      </div>
      <button class="fab" id="fabAdd">+</button>
    </section>

    <!-- ===== PAGE: 我的 ===== -->
    <section id="page-profile" class="page">
      <div class="page-scroll">
        <div class="profile-hero">
          <div class="avatar-wrap" id="avatarWrap">
            <div class="avatar-placeholder">+</div>
            <img class="avatar-img hidden" id="avatarImg" alt="avatar">
            <input type="file" id="avatarInput" accept="image/*" hidden>
          </div>
          <h1 class="profile-name" id="profileName">设置你的档案</h1>
        </div>
        <div class="profile-form">
          <div class="form-group"><label>昵称</label><input type="text" id="inputNickname" placeholder="你的名字" class="form-input"></div>
          <div class="form-row">
            <div class="form-group half"><label>身高 (cm)</label><input type="number" id="inputHeight" placeholder="165" class="form-input"></div>
            <div class="form-group half"><label>体重 (kg)</label><input type="number" id="inputWeight" placeholder="55" class="form-input"></div>
          </div>
          <div class="form-group">
            <label>穿衣风格偏好</label>
            <div class="style-tags" id="styleTags">
              <button class="style-tag" data-style="极简">极简</button>
              <button class="style-tag" data-style="法式">法式</button>
              <button class="style-tag" data-style="街头">街头</button>
              <button class="style-tag" data-style="优雅">优雅</button>
              <button class="style-tag" data-style="复古">复古</button>
              <button class="style-tag" data-style="中性">中性</button>
              <button class="style-tag" data-style="甜美">甜美</button>
              <button class="style-tag" data-style="学院">学院</button>
            </div>
          </div>
          <button class="btn-primary" id="btnSaveProfile">保存档案</button>
        </div>
        <!-- Wear diary -->
        <div class="wear-diary">
          <h3 class="section-title" style="padding:0 24px">穿着日记</h3>
          <div class="diary-list" id="diaryList"><div class="empty-hint">还没有记录</div></div>
        </div>
        <div class="profile-settings">
          <h3 class="settings-title">设置</h3>
          <div class="setting-row"><span>冷却天数</span>
            <div class="stepper"><button class="stepper-btn" data-field="cooldown" data-delta="-1">−</button><span id="cooldownValue">7</span><button class="stepper-btn" data-field="cooldown" data-delta="1">+</button></div>
          </div>
        </div>
        <div class="profile-actions">
          <button class="btn-outline" id="btnExport">导出数据</button>
          <button class="btn-outline" id="btnImport">导入数据</button>
          <input type="file" id="importInput" accept=".json" hidden>
        </div>
      </div>
    </section>

    <!-- Bottom Nav -->
    <nav class="bottom-nav">
      <button class="nav-item active" data-page="home">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9.5 21V13.5H14.5V21M4 10L12 3L20 10V19C20 20.1 19.1 21 18 21H6C4.9 21 4 20.1 4 19V10Z"/></svg>
        <span>今日</span>
      </button>
      <button class="nav-item" data-page="wardrobe">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 6H21M3 6V20C3 20.55 3.45 21 4 21H20C20.55 21 21 20.55 21 20V6M3 6L5 3H19L21 6M12 6V21M8 10H10M14 10H16"/></svg>
        <span>衣橱</span>
      </button>
      <button class="nav-item" data-page="profile">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="8" r="4"/><path d="M5 20C5 17.24 8.13 15 12 15C15.87 15 19 17.24 19 20"/></svg>
        <span>我的</span>
      </button>
    </nav>
  </div>

  <!-- ===== MODAL: Choose upload type ===== -->
  <div id="modalUploadType" class="modal hidden">
    <div class="modal-content modal-sm">
      <h3>添加什么？</h3>
      <button class="choice-btn" id="btnAddItem">👕 单品图<span class="choice-sub">单独的一件上衣、裤子、鞋子…</span></button>
      <button class="choice-btn" id="btnAddOutfit">👗 搭配组图<span class="choice-sub">全身照/模特照，关联已有单品</span></button>
    </div>
  </div>

  <!-- ===== MODAL: Add Item ===== -->
  <div id="modalAddItem" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <button class="modal-close" data-close="modalAddItem">✕</button>
        <h2>添加单品</h2>
        <span class="modal-progress" id="itemProgress"></span>
      </div>
      <div class="modal-body">
        <div id="itemPhaseUpload">
          <div class="upload-zone" id="itemUploadZone">
            <div class="upload-icon">📸</div>
            <p>选择单品照片</p>
            <p class="upload-hint">最多 5 张，逐张确认入库</p>
            <input type="file" id="itemFileInput" accept="image/*" multiple hidden>
          </div>
          <div class="upload-thumbs" id="itemUploadThumbs"></div>
        </div>
        <div id="itemPhaseConfirm" class="hidden">
          <img id="itemConfirmImg" class="confirm-img" alt="">
          <div class="form-group"><label>类别</label>
            <div class="filter-scroll" id="itemCatPick">
              <button class="filter-chip" data-val="上装">上装</button>
              <button class="filter-chip" data-val="下装">下装</button>
              <button class="filter-chip" data-val="外套">外套</button>
              <button class="filter-chip" data-val="连衣裙">连衣裙</button>
              <button class="filter-chip" data-val="鞋子">鞋子</button>
              <button class="filter-chip" data-val="配饰">配饰</button>
            </div>
          </div>
          <div class="form-group"><label>颜色</label><div class="color-row" id="itemColorPick"></div></div>
          <div class="form-group"><label>季节</label>
            <div class="filter-scroll" id="itemSeasonPick">
              <button class="filter-chip" data-val="四季">四季</button>
              <button class="filter-chip" data-val="春">春</button>
              <button class="filter-chip" data-val="夏">夏</button>
              <button class="filter-chip" data-val="秋">秋</button>
              <button class="filter-chip" data-val="冬">冬</button>
            </div>
          </div>
          <div class="form-group"><label>场合</label>
            <div class="filter-scroll" id="itemOccPick">
              <button class="filter-chip" data-val="通勤">通勤</button>
              <button class="filter-chip" data-val="休闲">休闲</button>
              <button class="filter-chip" data-val="约会">约会</button>
              <button class="filter-chip" data-val="运动">运动</button>
              <button class="filter-chip" data-val="正式">正式</button>
              <button class="filter-chip" data-val="度假">度假</button>
            </div>
          </div>
          <div class="form-group"><label>备注</label>
            <textarea id="itemNote" class="form-input" rows="2" placeholder="随便写点什么"></textarea>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <span class="footer-hint" id="itemFooterHint"></span>
        <button class="btn-primary" id="btnItemAction">开始确认</button>
      </div>
    </div>
  </div>

  <!-- ===== MODAL: Add Outfit ===== -->
  <div id="modalAddOutfit" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <button class="modal-close" data-close="modalAddOutfit">✕</button>
        <h2>添加搭配组</h2>
        <span></span>
      </div>
      <div class="modal-body">
        <div class="upload-zone" id="outfitUploadZone">
          <div class="upload-icon">📸</div>
          <p>上传搭配照片</p>
          <p class="upload-hint">支持多张，同一搭配风格</p>
          <input type="file" id="outfitFileInput" accept="image/*" multiple hidden>
        </div>
        <div class="upload-thumbs hidden" id="outfitPreviewArea"></div>
        <div class="form-group"><label>季节</label>
          <div class="filter-scroll" id="outfitSeasonPick">
            <button class="filter-chip" data-val="四季">四季</button>
            <button class="filter-chip" data-val="春">春</button>
            <button class="filter-chip" data-val="夏">夏</button>
            <button class="filter-chip" data-val="秋">秋</button>
            <button class="filter-chip" data-val="冬">冬</button>
          </div>
        </div>
        <div class="form-group"><label>备注</label>
          <textarea id="outfitNote" class="form-input" rows="2" placeholder="这套搭配的灵感或场景"></textarea>
        </div>
        <div class="form-group">
          <label>关联单品</label>
          <div class="linked-items" id="linkedItemsList"></div>
          <div class="link-actions">
            <button class="btn-outline-sm" id="btnLinkFromWardrobe">从衣橱选择</button>
            <button class="btn-outline-sm" id="btnLinkAddNew">快速添加新单品</button>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <span></span>
        <button class="btn-primary" id="btnSaveOutfit">保存搭配组</button>
      </div>
    </div>
  </div>

  <!-- ===== MODAL: Pick items from wardrobe ===== -->
  <div id="modalPickItems" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <button class="modal-close" data-close="modalPickItems">✕</button>
        <h2>选择单品</h2>
        <button class="btn-text" id="btnPickDone">完成</button>
      </div>
      <div class="modal-body">
        <div class="pick-grid" id="pickGrid"></div>
      </div>
    </div>
  </div>

  <!-- ===== MODAL: Fullscreen image viewer ===== -->
  <div id="modalViewer" class="modal-viewer hidden">
    <div class="viewer-header">
      <button class="viewer-close" id="viewerClose">✕</button>
      <span class="viewer-counter" id="viewerCounter"></span>
      <button class="viewer-like" id="viewerLike">♡</button>
    </div>
    <div class="viewer-body" id="viewerBody">
      <img id="viewerImg" class="viewer-img" alt="">
    </div>
    <div class="viewer-actions" id="viewerActions">
      <button class="viewer-action-btn" id="viewerAddOutfitPhotos">+ 搭配图</button>
      <button class="viewer-action-btn" id="viewerLinkItems">+ 关联单品</button>
      <button class="viewer-action-btn" id="viewerSortUp">↑</button>
      <button class="viewer-action-btn" id="viewerSortDown">↓</button>
      <input type="file" id="viewerOutfitInput" accept="image/*" multiple hidden>
    </div>
    <div class="viewer-info" id="viewerInfo"></div>
  </div>

  <!-- ===== MODAL: Record today's wear ===== -->
  <div id="modalRecordWear" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <button class="modal-close" data-close="modalRecordWear">✕</button>
        <h2>今天穿了什么？</h2>
        <button class="btn-text" id="btnRecordDone">确认</button>
      </div>
      <div class="modal-body">
        <div class="pick-grid" id="recordPickGrid"></div>
      </div>
    </div>
  </div>

  <!-- Prompt: add outfit for item -->
  <div id="modalPromptOutfit" class="modal hidden">
    <div class="modal-content modal-sm">
      <h3>为这件单品添加搭配参考？</h3>
      <p style="font-size:.78rem;color:var(--grey-500);text-align:center;margin-bottom:16px">上传搭配照帮助系统学习你的搭配风格</p>
      <button class="btn-primary" id="btnPromptYes" style="margin-bottom:10px">添加搭配图</button>
      <button class="btn-outline-dark" id="btnPromptSkip" style="width:100%">跳过</button>
    </div>
  </div>

  <!-- Feedback modal -->
  <div id="modalFeedback" class="modal hidden">
    <div class="modal-content modal-sm">
      <h3>这套搭配怎么样？</h3>
      <div class="feedback-options">
        <button class="feedback-btn" data-fb="love">❤️ 超喜欢</button>
        <button class="feedback-btn" data-fb="ok">👌 还行</button>
        <button class="feedback-btn" data-fb="style">💅 风格不对</button>
        <button class="feedback-btn" data-fb="skip">⏭ 今天不想穿</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>
</div>
<script src="app.js"></script>
</body>
</html>
