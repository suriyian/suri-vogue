<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>SURI VOGUE</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Noto+Sans+SC:wght@300;400;500&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">

  <!-- ===== HOME ===== -->
  <section id="page-home" class="page active">
    <div class="hero" id="hero">
      <div class="hero-overlay"></div>
      <div class="hero-content">
        <div class="brand">SURI VOGUE</div>
        <div class="quote" id="heroQuote"></div>
        <div class="season-pick" id="seasonPick">
          <button class="season-btn" data-s="春">春</button>
          <button class="season-btn" data-s="夏">夏</button>
          <button class="season-btn active" data-s="秋">秋</button>
          <button class="season-btn" data-s="冬">冬</button>
        </div>
        <button class="dress-btn" id="btnDress">Dress me.</button>
        <div class="wear-prompt" id="wearPrompt">
          <span class="wp-label">Worn today?</span>
          <button class="wp-btn" id="btnRecordWear">Record</button>
        </div>
      </div>
    </div>
    <div id="recoPage" class="reco-page hidden">
      <div class="reco-header">
        <button class="reco-back" id="recoBack">←</button>
        <span class="reco-title">Your looks.</span>
      </div>
      <div class="reco-list" id="recoList"></div>
      <div class="reco-footer">
        <button class="self-style-btn" id="btnSelfStyle">I'll style myself.</button>
      </div>
    </div>
    <!-- Self style -->
    <div id="selfPage" class="self-page hidden">
      <div class="reco-header">
        <button class="reco-back" id="selfBack">←</button>
        <span class="reco-title">Your choice.</span>
      </div>
      <div class="self-grid" id="selfGrid"></div>
      <div class="reco-footer">
        <button class="dress-btn" id="btnConfirmSelf">Confirm.</button>
      </div>
    </div>
  </section>

  <!-- ===== WARDROBE ===== -->
  <section id="page-wardrobe" class="page">
    <div class="page-scroll">
      <div class="w-header">
        <h1 class="w-title">Wardrobe</h1>
        <div class="w-stats" id="wStats"></div>
      </div>
      <div class="w-tabs" id="wTabs">
        <button class="w-tab active" data-tab="items">单品</button>
        <button class="w-tab" data-tab="outfits">搭配</button>
        <button class="w-tab" data-tab="inspo">灵感</button>
      </div>
      <!-- Items filters -->
      <div class="filters" id="filtersSection">
        <div class="f-row">
          <div class="f-chips" id="fCat">
            <button class="f-chip active" data-v="all">全部</button>
            <button class="f-chip" data-v="上装">上装</button>
            <button class="f-chip" data-v="下装">下装</button>
            <button class="f-chip" data-v="外套">外套</button>
            <button class="f-chip" data-v="连衣裙">连衣裙</button>
            <button class="f-chip" data-v="鞋子">鞋子</button>
            <button class="f-chip" data-v="配饰">配饰</button>
          </div>
        </div>
        <div class="f-row">
          <div class="f-chips" id="fSeason">
            <button class="f-chip active" data-v="all">全部</button>
            <button class="f-chip" data-v="春">春</button>
            <button class="f-chip" data-v="夏">夏</button>
            <button class="f-chip" data-v="秋">秋</button>
            <button class="f-chip" data-v="冬">冬</button>
          </div>
        </div>
        <div class="f-row">
          <div class="f-chips" id="fColor">
            <button class="f-chip active" data-v="all">全部</button>
            <button class="f-chip" data-v="黑">黑</button>
            <button class="f-chip" data-v="白">白</button>
            <button class="f-chip" data-v="灰">灰</button>
            <button class="f-chip" data-v="米">米</button>
            <button class="f-chip" data-v="棕">棕</button>
            <button class="f-chip" data-v="蓝">蓝</button>
            <button class="f-chip" data-v="红">红</button>
            <button class="f-chip" data-v="粉">粉</button>
            <button class="f-chip" data-v="绿">绿</button>
          </div>
        </div>
      </div>
      <div class="grid" id="mainGrid"></div>
    </div>
    <button class="fab" id="fabAdd">+</button>
  </section>

  <!-- ===== PROFILE ===== -->
  <section id="page-profile" class="page">
    <div class="page-scroll">
      <div class="p-hero">
        <div class="p-avatar" id="pAvatar"><span>+</span><img id="pAvatarImg" class="p-avatar-img hidden" alt=""><input type="file" id="avatarInput" accept="image/*" hidden></div>
        <h1 class="p-name" id="pName">Your profile</h1>
      </div>
      <div class="p-form">
        <div class="fg"><label>昵称</label><input type="text" id="inName" placeholder="Your name" class="fi"></div>
        <div class="fg-row">
          <div class="fg half"><label>身高 cm</label><input type="number" id="inHeight" placeholder="165" class="fi"></div>
          <div class="fg half"><label>体重 kg</label><input type="number" id="inWeight" placeholder="55" class="fi"></div>
        </div>
        <button class="save-btn" id="btnSaveProfile">Save</button>
      </div>
      <div class="diary-section">
        <h3 class="s-title">Wear diary</h3>
        <div id="diaryList" class="diary-list"><div class="empty-hint">No records yet</div></div>
      </div>
      <div class="p-settings">
        <h3 class="s-title">Settings</h3>
        <div class="set-row"><span>冷却天数</span><div class="stepper"><button class="st-btn" data-d="-1">−</button><span id="cdVal">7</span><button class="st-btn" data-d="1">+</button></div></div>
      </div>
      <div class="p-actions">
        <button class="outline-btn" id="btnExport">导出</button>
        <button class="outline-btn" id="btnImport">导入</button>
        <input type="file" id="importInput" accept=".json" hidden>
      </div>
    </div>
  </section>

  <!-- Bottom Nav -->
  <nav class="nav">
    <button class="nav-btn active" data-page="home"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9.5 21V13.5H14.5V21M4 10L12 3L20 10V19C20 20.1 19.1 21 18 21H6C4.9 21 4 20.1 4 19V10Z"/></svg><span>Today</span></button>
    <button class="nav-btn" data-page="wardrobe"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 6H21M3 6V20C3 20.55 3.45 21 4 21H20C20.55 21 21 20.55 21 20V6M3 6L5 3H19L21 6M12 6V21"/></svg><span>Wardrobe</span></button>
    <button class="nav-btn" data-page="profile"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="8" r="4"/><path d="M5 20C5 17.24 8.13 15 12 15C15.87 15 19 17.24 19 20"/></svg><span>Me</span></button>
  </nav>

  <!-- ===== MODALS ===== -->

  <!-- Choose add type -->
  <div id="mChoose" class="modal hidden">
    <div class="modal-c modal-sm">
      <button class="choice" id="chItem">👕 单品<span class="choice-sub">一件衣服、一双鞋</span></button>
      <button class="choice" id="chOutfit">📸 搭配<span class="choice-sub">穿搭全身照，关联单品</span></button>
      <button class="choice" id="chInspo">✨ 灵感<span class="choice-sub">别人的好看搭配，学习审美</span></button>
    </div>
  </div>

  <!-- Add Item -->
  <div id="mItem" class="modal hidden">
    <div class="modal-c">
      <div class="mh"><button class="mx" data-close="mItem">✕</button><h2>添加单品</h2><span class="mprog" id="itemProg"></span></div>
      <div class="mb">
        <div id="itemUp">
          <div class="upzone" id="itemZone"><div class="upicon">📸</div><p>选择单品照片</p><p class="uphint">最多5张，逐张确认</p><input type="file" id="itemFileIn" accept="image/*" multiple hidden></div>
          <div class="upthumbs" id="itemThumbs"></div>
        </div>
        <div id="itemConfirm" class="hidden">
          <img id="itemCImg" class="cimg" alt="">
          <div class="fg"><label>类别</label><div class="f-chips" id="iCat">
            <button class="f-chip" data-v="上装">上装</button><button class="f-chip" data-v="下装">下装</button><button class="f-chip" data-v="外套">外套</button><button class="f-chip" data-v="连衣裙">连衣裙</button><button class="f-chip" data-v="鞋子">鞋子</button><button class="f-chip" data-v="配饰">配饰</button>
          </div></div>
          <div class="fg"><label>颜色</label><div class="color-row" id="iColor"></div></div>
          <div class="fg"><label>季节</label><div class="f-chips" id="iSeason">
            <button class="f-chip" data-v="四季">四季</button><button class="f-chip" data-v="春">春</button><button class="f-chip" data-v="夏">夏</button><button class="f-chip" data-v="秋">秋</button><button class="f-chip" data-v="冬">冬</button>
          </div></div>
          <div class="fg"><label>备注</label><textarea id="iNote" class="fi ta" rows="2" placeholder=""></textarea></div>
        </div>
      </div>
      <div class="mf"><span class="mfhint" id="itemHint"></span><button class="save-btn" id="itemBtn">开始确认</button></div>
    </div>
  </div>

  <!-- Add Outfit -->
  <div id="mOutfit" class="modal hidden">
    <div class="modal-c">
      <div class="mh"><button class="mx" data-close="mOutfit">✕</button><h2>添加搭配</h2><span></span></div>
      <div class="mb">
        <div class="upzone" id="outfitZone"><div class="upicon">📸</div><p>上传搭配照</p><p class="uphint">支持多张</p><input type="file" id="outfitFileIn" accept="image/*" multiple hidden></div>
        <div class="upthumbs hidden" id="outfitThumbs"></div>
        <div class="fg"><label>备注</label><textarea id="oNote" class="fi ta" rows="2" placeholder="这套搭配的灵感"></textarea></div>
        <div class="fg"><label>关联单品</label><div class="linked" id="linkedList"></div>
          <div class="link-acts"><button class="outline-btn-sm" id="btnLinkPick">从衣橱选</button><button class="outline-btn-sm" id="btnLinkNew">快速添加</button></div>
        </div>
      </div>
      <div class="mf"><span></span><button class="save-btn" id="outfitBtn">保存搭配</button></div>
    </div>
  </div>

  <!-- Add Inspo -->
  <div id="mInspo" class="modal hidden">
    <div class="modal-c">
      <div class="mh"><button class="mx" data-close="mInspo">✕</button><h2>收藏灵感</h2><span></span></div>
      <div class="mb">
        <div class="upzone" id="inspoZone"><div class="upicon">✨</div><p>上传灵感图片</p><p class="uphint">杂志、街拍、任何美的搭配</p><input type="file" id="inspoFileIn" accept="image/*" multiple hidden></div>
        <div class="upthumbs hidden" id="inspoThumbs"></div>
        <div class="fg"><label>备注</label><textarea id="inspoNote" class="fi ta" rows="2" placeholder="为什么喜欢这张"></textarea></div>
      </div>
      <div class="mf"><span></span><button class="save-btn" id="inspoBtn">收藏</button></div>
    </div>
  </div>

  <!-- Prompt add outfit after item -->
  <div id="mPrompt" class="modal hidden">
    <div class="modal-c modal-sm">
      <p class="prompt-text">为这件单品添加搭配参考？</p>
      <button class="save-btn" id="promptYes" style="margin-bottom:10px">添加搭配图</button>
      <button class="outline-btn-full" id="promptSkip">跳过</button>
    </div>
  </div>

  <!-- Pick items -->
  <div id="mPick" class="modal hidden">
    <div class="modal-c">
      <div class="mh"><button class="mx" data-close="mPick">✕</button><h2>选择单品</h2><button class="text-btn" id="pickDone">完成</button></div>
      <div class="mb"><div class="pick-grid" id="pickGrid"></div></div>
    </div>
  </div>

  <!-- Record wear -->
  <div id="mRecord" class="modal hidden">
    <div class="modal-c">
      <div class="mh"><button class="mx" data-close="mRecord">✕</button><h2>Today's outfit</h2><button class="text-btn" id="recordDone">确认</button></div>
      <div class="mb"><div class="pick-grid" id="recordGrid"></div></div>
    </div>
  </div>

  <!-- Fullscreen viewer -->
  <div id="viewer" class="viewer hidden">
    <div class="v-top"><button class="v-close" id="vClose">✕</button><span class="v-count" id="vCount"></span><button class="v-like" id="vLike">♡</button></div>
    <div class="v-body" id="vBody"><img id="vImg" class="v-img" alt=""></div>
    <div class="v-acts" id="vActs">
      <button class="v-act" id="vAddOutfit">+ 搭配图</button>
      <button class="v-act" id="vLinkItems">+ 关联</button>
      <button class="v-act" id="vSortUp">↑</button>
      <button class="v-act" id="vSortDown">↓</button>
      <input type="file" id="vOutfitIn" accept="image/*" multiple hidden>
    </div>
    <div class="v-info" id="vInfo"></div>
  </div>

  <div id="toast" class="toast hidden"></div>
</div>
<script src="app.js"></script>
</body>
</html>
